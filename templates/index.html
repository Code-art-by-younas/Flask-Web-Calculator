<!DOCTYPE html>
<html>
<head>
    <title>Flask Calculator</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            margin-top: 50px;
        }

        .box {
            background: white;
            padding: 20px;
            width: 300px;
            margin: auto;
            box-shadow: 0px 0px 10px gray;
            border-radius: 10px;
        }

        input, select {
            padding: 10px;
            margin: 10px;
            width: 80%;
        }

        button {
            padding: 10px;
            width: 85%;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }

        h2 {
            color: darkblue;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Flask Calculator 🧮</h2>

    <form method="POST">
        <input type="number" name="num1" placeholder="First Number" required><br>

        <input type="number" name="num2" placeholder="Second Number" required><br>

        <select name="operation">
            <option value="add">Add</option>
            <option value="subtract">Subtract</option>
            <option value="multiply">Multiply</option>
            <option value="divide">Divide</option>
        </select><br>

        <button type="submit">Calculate</button>
    </form>

    <h3>Result: {{ result }}</h3>
</div>

</body>
</html>
